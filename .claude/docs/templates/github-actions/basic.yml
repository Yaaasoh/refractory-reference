# GitHub Actions - Claude Code 基本統合
#
# 出典: session_2_6_github_actions.md 行492-514
# 抽出日: 2025-12-31
# SVCP観点: CI/CDでの∃自動化

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
